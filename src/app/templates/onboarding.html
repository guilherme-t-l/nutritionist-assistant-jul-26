<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriAgent</title>
  <style>
    :root {
      --bg: #f7f5f0;
      --panel: #ffffff;
      --panel-2: #fafaf7;
      --ink: #1f2937;
      --muted: #6b7280;
      --accent: #2f855a;
      --accent-soft: #e8f3ec;
      --accent-ink: #1f6a48;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --user-bubble: #2f855a;
      --user-ink: #ffffff;
      --assistant-bubble: #f1efea;
      --assistant-ink: #1f2937;
      --danger: #b91c1c;
      --ok: #2f855a;
      --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.04);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .hidden { display: none !important; }

    /* ---------- Onboarding view (same form, slightly polished) ---------- */
    .onboarding {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }
    .onboarding h1 { margin-bottom: 0.25rem; }
    .onboarding .subtitle { color: var(--muted); margin-top: 0; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    .hint { font-weight: 400; color: var(--muted); font-size: 0.85rem; }
    input[type="text"], input[type="password"], input[type="number"], select, textarea {
      width: 100%;
      padding: 0.55rem 0.7rem;
      margin-top: 0.25rem;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
      background: var(--panel);
      color: var(--ink);
    }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: var(--accent);
    }
    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.4rem 1rem;
      margin-top: 0.4rem;
    }
    .checkbox-grid label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin: 0;
      font-weight: 400;
    }
    .checkbox-grid input[type="checkbox"] { width: auto; margin: 0; }
    .macro-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }
    .macro-row > div > label { margin-top: 0.5rem; font-size: 0.9rem; }
    .btn-primary {
      margin-top: 1.25rem;
      background: var(--accent);
      color: white;
      border: 0;
      padding: 0.65rem 1.2rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease;
    }
    .btn-primary:hover:not(:disabled) { background: #256b48; }
    .btn-primary:active:not(:disabled) { transform: translateY(1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: wait; }
    .error { color: var(--danger); margin-top: 0.5rem; }

    /* ---------- Split-panel app layout ---------- */
    .app {
      display: grid;
      grid-template-columns: 45% 55%;
      height: 100vh;
      width: 100%;
      background: var(--bg);
    }
    .chat-panel {
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--panel);
      border-right: 1px solid var(--border);
      min-width: 0;
      height: 100vh;
    }
    .plan-panel {
      overflow-y: auto;
      padding: 1.5rem;
      min-width: 0;
      height: 100vh;
    }
    .plan-save {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.35rem;
      max-width: 760px;
      width: 100%;
      margin: 0 auto 0.85rem;
    }
    .plan-save-btn {
      appearance: none;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.48rem 1rem 0.48rem 0.85rem;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 0.84rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow:
        0 1px 2px rgba(31, 106, 72, 0.18),
        0 6px 16px rgba(47, 133, 90, 0.22);
      transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      animation: plan-save-in 0.22s ease-out;
    }
    .plan-save-btn:hover:not(:disabled) {
      background: #256b48;
      box-shadow:
        0 1px 2px rgba(31, 106, 72, 0.2),
        0 8px 20px rgba(47, 133, 90, 0.28);
    }
    .plan-save-btn:active:not(:disabled) { transform: translateY(1px); }
    .plan-save-btn:disabled {
      opacity: 0.4;
      cursor: default;
      box-shadow: none;
      background: #8a9a90;
    }
    .plan-save-btn.is-dirty:disabled {
      opacity: 0.55;
      cursor: wait;
      background: var(--accent);
      box-shadow: none;
    }
    .plan-save-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .plan-save-error {
      margin: 0;
      color: var(--danger);
      font-size: 0.8rem;
      text-align: right;
      max-width: 16rem;
    }
    @keyframes plan-save-in {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Chat header */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .chat-header .brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
    }
    .chat-header .brand .dot {
      width: 10px; height: 10px; border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .btn-ghost:hover { color: var(--accent-ink); border-color: var(--accent); background: var(--accent-soft); }
    .header-actions { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: flex-end; }

    /* Welcome view */
    .welcome {
      max-width: 420px;
      margin: 0 auto;
      padding: 3rem 1rem 3rem;
    }
    .welcome h1 { margin-bottom: 0.25rem; }
    .welcome .subtitle { color: var(--muted); margin-top: 0; margin-bottom: 1.5rem; }
    .welcome-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .welcome-divider::before,
    .welcome-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-strong);
    }
    .btn-secondary {
      width: 100%;
      margin-top: 0;
      background: var(--panel);
      color: var(--accent-ink);
      border: 1px solid var(--accent);
      padding: 0.65rem 1.2rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn-secondary:hover { background: var(--accent-soft); }
    .welcome .btn-primary { width: 100%; }

    /* Chat thread */
    .chat-thread {
      overflow-y: auto;
      padding: 1.25rem 1.25rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      scroll-behavior: smooth;
    }
    .bubble {
      max-width: 82%;
      padding: 0.6rem 0.85rem;
      border-radius: 14px;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.4;
      animation: bubble-in 0.18s ease-out;
    }
    @keyframes bubble-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--user-bubble);
      color: var(--user-ink);
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: var(--assistant-bubble);
      color: var(--assistant-ink);
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      background: var(--assistant-bubble);
      color: var(--muted);
      padding: 0.6rem 0.85rem;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      display: inline-flex;
      gap: 4px;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 999px;
      background: currentColor;
      opacity: 0.5;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-2px); }
    }

    /* Chat input */
    .chat-input-area {
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem 1rem;
      background: var(--panel);
    }
    .chat-input-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      padding: 0.45rem 0.5rem 0.45rem 0.75rem;
      background: var(--panel);
      transition: border-color 0.15s;
    }
    .chat-input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .chat-input-row textarea {
      flex: 1;
      margin: 0;
      border: 0;
      padding: 0.3rem 0;
      resize: none;
      outline: none !important;
      box-shadow: none !important;
      font-size: 0.95rem;
      line-height: 1.4;
      max-height: calc(1.4em * 4 + 0.6em);
      overflow-y: auto;
      background: transparent;
    }
    .chat-input-row textarea:focus { outline: none; border: 0; }
    .send-btn {
      background: var(--accent);
      color: white;
      border: 0;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    .send-btn:hover:not(:disabled) { background: #256b48; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }
    .chat-input-error { color: var(--danger); font-size: 0.85rem; margin: 0.4rem 0.25rem 0; }

    /* ---------- Meal plan card ---------- */
    .plan-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: var(--shadow);
      max-width: 760px;
      margin: 0 auto;
    }
    .plan-empty {
      max-width: 760px;
      margin: 3rem auto;
      text-align: center;
      color: var(--muted);
    }
    .day-tabs {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .day-tab {
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .day-tab.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent-ink);
    }

    .meal-block { padding: 0.75rem 0 1rem; }
    .meal-block + .meal-block { border-top: 1px solid var(--border); }
    .meal-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .meal-name {
      font-size: 1.05rem;
      font-weight: 700;
      margin: 0;
    }
    .meal-desc {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 0 0 0.6rem;
    }
    .food-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .food-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      align-items: start;
      font-size: 0.93rem;
      padding: 0.1rem 0;
    }
    .food-main {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      min-width: 0;
    }
    .food-name { color: var(--ink); }
    .food-qty {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .food-macros {
      color: #9ca3af;
      font-size: 0.78rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
    }
    .food-meta {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      padding-top: 0.1rem;
    }
    .meal-total {
      margin-top: 0.75rem;
      padding-top: 0.55rem;
      border-top: 1px dashed var(--border);
      color: var(--muted);
      font-size: 0.88rem;
      font-variant-numeric: tabular-nums;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
    }
    .meal-total strong { color: var(--ink); font-weight: 600; }

    .day-total {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 2px solid var(--ink);
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-variant-numeric: tabular-nums;
    }
    .day-total .label { font-weight: 700; }
    .day-total .macros { color: var(--muted); }
    .target-row {
      margin-top: 0.5rem;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-size: 0.9rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .delta.ok { color: var(--ok); font-weight: 600; }
    .delta.off { color: var(--danger); font-weight: 600; }
    .plan-notes {
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px dashed var(--border);
      color: var(--muted);
      font-size: 0.88rem;
      font-style: italic;
    }

    /* ---------- Mobile: stack plan on top, chat below ---------- */
    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        height: auto;
        min-height: 100vh;
      }
      .plan-panel {
        order: 1;
        height: auto;
        max-height: 60vh;
        border-bottom: 1px solid var(--border);
      }
      .chat-panel {
        order: 2;
        height: auto;
        min-height: 50vh;
        border-right: 0;
      }
      .chat-thread { max-height: 40vh; }
    }
  </style>
</head>
<body>
  <!-- WELCOME VIEW -->
  <main id="welcome-view" class="welcome hidden">
    <h1>Nutritionist AI</h1>
    <p class="subtitle">Personalized meal plans — guest or saved account.</p>
    <section class="card">
      <button type="button" id="guest-btn" class="btn-secondary">Continue as Guest</button>
      <div class="welcome-divider">or</div>
      <form id="login-form">
        <label for="login-username">Username</label>
        <input id="login-username" name="username" type="text" autocomplete="username" required />
        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" autocomplete="current-password" required />
        <button type="submit" id="login-btn" class="btn-primary">Log In</button>
        <p id="login-error" class="error hidden"></p>
      </form>
    </section>
  </main>

  <!-- ONBOARDING VIEW -->
  <main id="onboarding-view" class="onboarding hidden">
    <h1>NutriAgent</h1>
    <p id="onboarding-subtitle" class="subtitle">A Brazilian AI nutritionist. Tell it about you; it builds a day of meals.</p>

    <section class="card">
      <form id="profile-form">
        <label for="goal">Goal</label>
        <select id="goal" name="goal" required>
          <option value="lose_weight">Lose weight</option>
          <option value="maintain" selected>Maintain</option>
          <option value="gain_muscle">Gain muscle</option>
        </select>

        <label for="calorie_target">Daily calorie target (kcal)</label>
        <input id="calorie_target" name="calorie_target" type="number" min="800" max="5000" value="2000" required />

        <label>Macro targets <span class="hint">(optional — leave blank if you only care about calories)</span></label>
        <div class="macro-row">
          <div>
            <label for="protein_g_target">Protein (g)</label>
            <input id="protein_g_target" type="number" min="0" placeholder="e.g. 150" />
          </div>
          <div>
            <label for="carbs_g_target">Carbs (g)</label>
            <input id="carbs_g_target" type="number" min="0" placeholder="e.g. 250" />
          </div>
          <div>
            <label for="fat_g_target">Fat (g)</label>
            <input id="fat_g_target" type="number" min="0" placeholder="e.g. 70" />
          </div>
        </div>

        <label for="meals_per_day">Meals per day</label>
        <input id="meals_per_day" type="number" min="1" max="8" value="3" required />

        <label>Cuisine preferences <span class="hint">(tick any that apply)</span></label>
        <div class="checkbox-grid" id="cuisines">
          <label><input type="checkbox" value="Brazilian" checked /> Brazilian</label>
          <label><input type="checkbox" value="Bahian" /> Bahian</label>
          <label><input type="checkbox" value="Mineira" /> Mineira</label>
          <label><input type="checkbox" value="Paulista" /> Paulista</label>
          <label><input type="checkbox" value="Nordestina" /> Nordestina</label>
          <label><input type="checkbox" value="Japanese" /> Japanese</label>
          <label><input type="checkbox" value="Italian" /> Italian</label>
          <label><input type="checkbox" value="Mediterranean" /> Mediterranean</label>
        </div>

        <label>Flavor profiles <span class="hint">(tick any that apply)</span></label>
        <div class="checkbox-grid" id="flavors">
          <label><input type="checkbox" value="savory" /> Savory</label>
          <label><input type="checkbox" value="sweet" /> Sweet</label>
          <label><input type="checkbox" value="spicy" /> Spicy</label>
          <label><input type="checkbox" value="umami" /> Umami</label>
          <label><input type="checkbox" value="sour" /> Sour</label>
          <label><input type="checkbox" value="bitter" /> Bitter</label>
        </div>

        <label for="allergies">Allergies <span class="hint">(comma-separated — things you cannot safely eat)</span></label>
        <input id="allergies" name="allergies" type="text" placeholder="peanuts, shellfish" />

        <label for="disliked_ingredients">Dislikes <span class="hint">(comma-separated — you just don't enjoy them)</span></label>
        <input id="disliked_ingredients" name="disliked_ingredients" type="text" placeholder="cilantro, liver" />

        <button type="submit" id="submit-btn" class="btn-primary">Build my meal plan</button>
        <button type="button" id="cancel-form-btn" class="btn-ghost hidden" style="margin-top: 0.75rem; margin-left: 0.5rem;">Cancel</button>
        <p id="form-error" class="error hidden"></p>
      </form>
    </section>
  </main>

  <!-- SPLIT-PANEL VIEW -->
  <div id="split-view" class="app hidden">
    <aside class="chat-panel">
      <header class="chat-header">
        <div class="brand">
          <span class="dot" aria-hidden="true"></span>
          NutriAgent
        </div>
        <div class="header-actions">
          <button id="new-chat-btn" class="btn-ghost hidden" type="button">New chat</button>
          <button id="update-prefs-btn" class="btn-ghost hidden" type="button">Update preferences</button>
          <button id="new-plan-btn" class="btn-ghost" type="button">New plan</button>
          <button id="logout-btn" class="btn-ghost hidden" type="button">Log out</button>
        </div>
      </header>
      <div id="chat-thread" class="chat-thread" aria-live="polite"></div>
      <div class="chat-input-area">
        <form id="chat-form">
          <div class="chat-input-row">
            <textarea id="chat-input" rows="1" placeholder="Ask me to adjust anything…"></textarea>
            <button id="chat-send" type="submit" class="send-btn" aria-label="Send" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
            </button>
          </div>
          <p id="chat-error" class="chat-input-error hidden"></p>
        </form>
      </div>
    </aside>
    <main class="plan-panel">
      <div id="plan-save" class="plan-save hidden">
        <button id="save-plan-btn" class="plan-save-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <path d="M17 21v-8H7v8"/>
            <path d="M7 3v5h8"/>
          </svg>
          <span id="save-plan-label">Save plan</span>
        </button>
        <p id="plan-save-error" class="plan-save-error hidden"></p>
      </div>
      <div id="plan-card" class="plan-card">
        <div class="plan-empty">Your meal plan will appear here.</div>
      </div>
    </main>
  </div>

  <script>
    // ---------- Tiny DOM + utility helpers ----------
    const $ = (id) => document.getElementById(id);
    const SS_KEYS = {
      sessionId: "nutri.sessionId",
      calorieTarget: "nutri.calorieTarget",
      plan: "nutri.plan",
    };

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function checkedValues(containerId) {
      return Array.from(
        document.querySelectorAll(`#${containerId} input[type="checkbox"]:checked`)
      ).map((el) => el.value);
    }
    function parseCommaList(text) {
      return text.split(",").map((s) => s.trim()).filter(Boolean);
    }
    function optionalInt(id) {
      const raw = $(id).value.trim();
      if (!raw) return null;
      const n = Number(raw);
      return Number.isFinite(n) ? n : null;
    }

    // ---------- App state ----------
    // Session state lives in sessionStorage so a page reload inside the same
    // tab keeps the user in their conversation. Auth lives in an HttpOnly cookie.
    let state = {
      sessionId: sessionStorage.getItem(SS_KEYS.sessionId) || null,
      calorieTarget: Number(sessionStorage.getItem(SS_KEYS.calorieTarget)) || null,
      plan: safeParseJson(sessionStorage.getItem(SS_KEYS.plan)),
      messages: [], // {role: "user"|"assistant", text: string}
      waiting: false,
      activeDayIndex: 0,
      username: null,
      profile: null,
      // "plan" → POST /plan; "prefs" → PUT /profile (logged-in only)
      formMode: "plan",
      // Logged-in only: true when session plan differs from last saved active_plan.
      planDirty: false,
      savingPlan: false,
    };

    function safeParseJson(raw) {
      if (!raw) return null;
      try { return JSON.parse(raw); } catch { return null; }
    }

    function persistSession(sessionId, calorieTarget) {
      sessionStorage.setItem(SS_KEYS.sessionId, sessionId);
      if (calorieTarget != null) {
        sessionStorage.setItem(SS_KEYS.calorieTarget, String(calorieTarget));
      }
    }
    function persistPlan(plan) {
      sessionStorage.setItem(SS_KEYS.plan, JSON.stringify(plan));
    }
    function clearSession() {
      sessionStorage.removeItem(SS_KEYS.sessionId);
      sessionStorage.removeItem(SS_KEYS.calorieTarget);
      sessionStorage.removeItem(SS_KEYS.plan);
      state.sessionId = null;
      state.calorieTarget = null;
      state.plan = null;
      state.messages = [];
      state.activeDayIndex = 0;
      state.planDirty = false;
      state.savingPlan = false;
    }

    function isLoggedIn() {
      return !!state.username;
    }

    function markPlanClean() {
      state.planDirty = false;
      updateSavePlanButton();
    }

    function markPlanDirty() {
      if (!isLoggedIn()) return;
      state.planDirty = true;
      updateSavePlanButton();
    }

    function updateSavePlanButton() {
      const wrap = $("plan-save");
      const btn = $("save-plan-btn");
      const label = $("save-plan-label");
      if (!wrap || !btn || !label) return;
      // Logged-in with a plan: always show in the plan panel top-right.
      const show = isLoggedIn() && !!state.plan;
      wrap.classList.toggle("hidden", !show);
      if (!show) {
        $("plan-save-error").classList.add("hidden");
        return;
      }
      const canSave = state.planDirty && !state.savingPlan && !state.waiting;
      btn.disabled = !canSave;
      btn.classList.toggle("is-dirty", state.planDirty);
      label.textContent = state.savingPlan ? "Saving…" : "Save plan";
    }

    function confirmDiscardUnsaved() {
      if (!state.planDirty) return true;
      return window.confirm("You have unsaved plan changes. Discard them?");
    }

    function updateHeaderActions() {
      const loggedIn = isLoggedIn();
      $("new-chat-btn").classList.toggle("hidden", !loggedIn);
      $("update-prefs-btn").classList.toggle("hidden", !loggedIn);
      $("logout-btn").classList.toggle("hidden", !loggedIn);
      updateSavePlanButton();
    }

    // ---------- View switching ----------
    function showWelcome() {
      $("welcome-view").classList.remove("hidden");
      $("onboarding-view").classList.add("hidden");
      $("split-view").classList.add("hidden");
    }
    function showOnboarding(mode = "plan") {
      state.formMode = mode;
      const prefs = mode === "prefs";
      $("onboarding-subtitle").textContent = prefs
        ? "Update your preferences. Your current meal plan stays the same."
        : "A Brazilian AI nutritionist. Tell it about you; it builds a day of meals.";
      $("submit-btn").textContent = prefs ? "Save preferences" : "Build my meal plan";
      // Cancel only when returning to an existing split session (logged-in prefs/new plan).
      $("cancel-form-btn").classList.toggle("hidden", !(isLoggedIn() && state.plan));
      $("welcome-view").classList.add("hidden");
      $("onboarding-view").classList.remove("hidden");
      $("split-view").classList.add("hidden");
    }
    function showSplitView() {
      $("welcome-view").classList.add("hidden");
      $("onboarding-view").classList.add("hidden");
      $("split-view").classList.remove("hidden");
      updateHeaderActions();
      renderPlan(state.plan);
      renderChat();
      // Auto-grow textarea + focus
      setTimeout(() => {
        autosizeTextarea($("chat-input"));
        $("chat-input").focus();
      }, 0);
    }

    function collectProfilePayload() {
      return {
        goal: $("goal").value,
        calorie_target: Number($("calorie_target").value),
        protein_g_target: optionalInt("protein_g_target"),
        carbs_g_target: optionalInt("carbs_g_target"),
        fat_g_target: optionalInt("fat_g_target"),
        meals_per_day: Number($("meals_per_day").value),
        cuisine_preferences: checkedValues("cuisines"),
        flavor_profiles: checkedValues("flavors"),
        allergies: parseCommaList($("allergies").value),
        disliked_ingredients: parseCommaList($("disliked_ingredients").value),
      };
    }

    function setCheckboxGroup(containerId, values) {
      const set = new Set(values || []);
      document.querySelectorAll(`#${containerId} input[type="checkbox"]`).forEach((el) => {
        el.checked = set.has(el.value);
      });
    }

    function fillProfileForm(profile) {
      if (!profile) return;
      $("goal").value = profile.goal || "maintain";
      $("calorie_target").value = profile.calorie_target ?? 2000;
      $("protein_g_target").value = profile.protein_g_target ?? "";
      $("carbs_g_target").value = profile.carbs_g_target ?? "";
      $("fat_g_target").value = profile.fat_g_target ?? "";
      $("meals_per_day").value = profile.meals_per_day ?? 3;
      setCheckboxGroup("cuisines", profile.cuisine_preferences);
      setCheckboxGroup("flavors", profile.flavor_profiles);
      $("allergies").value = (profile.allergies || []).join(", ");
      $("disliked_ingredients").value = (profile.disliked_ingredients || []).join(", ");
    }

    async function enterLoggedInFromAuth(me) {
      state.username = me.username;
      state.profile = me.profile || null;
      if (me.has_plan) {
        await resumeConversation();
      } else {
        // Drop any leftover guest sessionStorage before first-time onboarding.
        clearSession();
        if (state.profile) fillProfileForm(state.profile);
        showOnboarding("plan");
      }
    }

    async function resumeConversation() {
      const res = await fetch("/session/resume", { method: "POST" });
      if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
      const data = await res.json();
      state.sessionId = data.session_id;
      state.profile = data.profile;
      state.plan = data.plan;
      state.calorieTarget = data.profile?.calorie_target ?? state.calorieTarget;
      state.messages = [];
      state.activeDayIndex = 0;
      persistSession(data.session_id, state.calorieTarget);
      persistPlan(data.plan);
      markPlanClean();
      showSplitView();
    }

    // ---------- Chat rendering ----------
    function renderChat() {
      const thread = $("chat-thread");
      thread.innerHTML = "";
      for (const m of state.messages) {
        const div = document.createElement("div");
        div.className = `bubble ${m.role}`;
        div.textContent = m.text;
        thread.appendChild(div);
      }
      if (state.waiting) {
        const typing = document.createElement("div");
        typing.className = "typing";
        typing.id = "typing-indicator";
        typing.innerHTML = "<span></span><span></span><span></span>";
        thread.appendChild(typing);
      }
      scrollChatToBottom();
    }

    function pushMessage(role, text) {
      state.messages.push({ role, text });
      renderChat();
    }

    // Prefer plan.notes (what the model wrote); fall back when empty — same idea as build_assistant_note.
    function assistantNote(plan, fallback) {
      const note = ((plan && plan.notes) || "").trim();
      if (note) return note;
      return fallback;
    }

    function scrollChatToBottom() {
      const thread = $("chat-thread");
      // requestAnimationFrame ensures layout is flushed before we scroll.
      requestAnimationFrame(() => {
        thread.scrollTop = thread.scrollHeight;
      });
    }

    // ---------- Plan rendering ----------
    // Our MealPlan schema is a single day (`meals: Meal[]`). The task spec
    // mentions "Day X of Y" tabs if the plan ever had multiple days — we
    // normalize to an array of days so the UI is ready for both shapes.
    function normalizeToDays(plan) {
      if (!plan) return [];
      if (Array.isArray(plan.days) && plan.days.length > 0) return plan.days;
      // Single-day plan: wrap in one pseudo-day.
      return [{ meals: plan.meals || [], notes: plan.notes || "" }];
    }

    function renderPlan(plan) {
      const card = $("plan-card");
      if (!plan || !plan.meals || plan.meals.length === 0) {
        card.innerHTML = `<div class="plan-empty">Your meal plan will appear here.</div>`;
        return;
      }

      const days = normalizeToDays(plan);
      const multiDay = days.length > 1;
      if (state.activeDayIndex >= days.length) state.activeDayIndex = 0;
      const day = days[state.activeDayIndex];

      let html = "";

      if (multiDay) {
        html += `<div class="day-tabs">`;
        days.forEach((_, i) => {
          const active = i === state.activeDayIndex ? " active" : "";
          html += `<button class="day-tab${active}" data-day="${i}" type="button">Day ${i + 1} of ${days.length}</button>`;
        });
        html += `</div>`;
      }

      for (const meal of day.meals) {
        html += renderMeal(meal);
      }

      // Daily totals — sum across meals. Schema gives us per-meal P/C/F/kcal
      // as computed fields, so we just aggregate on the client.
      const totals = day.meals.reduce((acc, m) => {
        acc.kcal += m.calories || 0;
        acc.p += m.protein_g || 0;
        acc.c += m.carbs_g || 0;
        acc.f += m.fat_g || 0;
        return acc;
      }, { kcal: 0, p: 0, c: 0, f: 0 });

      html += `
        <div class="day-total">
          <span class="label">Daily total</span>
          <span class="macros">
            <strong>${totals.kcal}</strong> kcal &nbsp;|&nbsp;
            P ${totals.p}g &nbsp; C ${totals.c}g &nbsp; F ${totals.f}g
          </span>
        </div>
      `;

      if (state.calorieTarget) {
        const delta = totals.kcal - state.calorieTarget;
        const withinTen = Math.abs(delta) <= state.calorieTarget * 0.10;
        const sign = delta > 0 ? "+" : (delta < 0 ? "−" : "±");
        const deltaClass = withinTen ? "ok" : "off";
        html += `
          <div class="target-row">
            <span>Target: ${state.calorieTarget} kcal</span>
            <span class="delta ${deltaClass}">Δ ${sign}${Math.abs(delta)} kcal</span>
          </div>
        `;
      }

      if (day.notes) {
        html += `<p class="plan-notes">${escapeHtml(day.notes)}</p>`;
      } else if (plan.notes) {
        html += `<p class="plan-notes">${escapeHtml(plan.notes)}</p>`;
      }

      card.innerHTML = html;

      // Wire up day tabs (if any).
      card.querySelectorAll(".day-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          state.activeDayIndex = Number(tab.dataset.day) || 0;
          renderPlan(state.plan);
        });
      });
    }

    function renderMeal(meal) {
      const foods = (meal.ingredients || []).map((food) => {
        const p = food.protein_g ?? 0;
        const c = food.carbs_g ?? 0;
        const f = food.fat_g ?? 0;
        return `
          <li class="food-row">
            <span class="food-main">
              <span class="food-name">${escapeHtml(food.name)} · <span class="food-qty">${escapeHtml(food.quantity)}</span></span>
              <span class="food-macros">P ${p}g · C ${c}g · F ${f}g</span>
            </span>
            <span class="food-meta">${food.calories} kcal</span>
          </li>
        `;
      }).join("");

      const desc = meal.description ? `<p class="meal-desc">${escapeHtml(meal.description)}</p>` : "";

      return `
        <section class="meal-block">
          <div class="meal-head">
            <h3 class="meal-name">${escapeHtml(meal.name || "")}</h3>
          </div>
          ${desc}
          <ul class="food-list">${foods}</ul>
          <div class="meal-total">
            <span>Meal total</span>
            <span>
              <strong>${meal.calories}</strong> kcal &nbsp;|&nbsp;
              P ${meal.protein_g}g &nbsp; C ${meal.carbs_g}g &nbsp; F ${meal.fat_g}g
            </span>
          </div>
        </section>
      `;
    }

    // ---------- Textarea autosize (up to 4 lines) ----------
    function autosizeTextarea(ta) {
      ta.style.height = "auto";
      // Cap at ~4 lines worth of content; CSS `max-height` then kicks in and
      // the textarea starts scrolling internally.
      ta.style.height = Math.min(ta.scrollHeight, 4 * 1.4 * 16 + 10) + "px";
    }

    // ---------- Onboarding / prefs submit ----------
    $("profile-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = $("submit-btn");
      const err = $("form-error");
      err.classList.add("hidden");
      btn.disabled = true;
      const idleLabel = state.formMode === "prefs" ? "Save preferences" : "Build my meal plan";
      btn.textContent = state.formMode === "prefs" ? "Saving…" : "Thinking…";

      const payload = collectProfilePayload();
      const calorieTarget = payload.calorie_target;

      try {
        if (state.formMode === "prefs") {
          const body = { ...payload, session_id: state.sessionId };
          const res = await fetch("/profile", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
          const data = await res.json();
          state.profile = data.profile;
          state.calorieTarget = data.profile.calorie_target;
          if (state.sessionId) persistSession(state.sessionId, state.calorieTarget);
          // Same plan in the right panel — prefs only.
          showSplitView();
        } else {
          const res = await fetch("/plan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
          const data = await res.json();

          state.sessionId = data.session_id;
          state.calorieTarget = calorieTarget;
          state.profile = payload;
          state.plan = data.plan;
          state.messages = [
            {
              role: "assistant",
              text: assistantNote(data.plan, "Here's your meal plan. Ask me to adjust anything."),
            },
          ];
          persistSession(data.session_id, calorieTarget);
          persistPlan(data.plan);
          // /plan already wrote active_plan for logged-in users.
          markPlanClean();
          showSplitView();
        }
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.remove("hidden");
      } finally {
        btn.disabled = false;
        btn.textContent = idleLabel;
      }
    });

    $("cancel-form-btn").addEventListener("click", () => {
      showSplitView();
    });

    // ---------- Chat submit ----------
    const chatInput = $("chat-input");
    const sendBtn = $("chat-send");

    function updateSendEnabled() {
      const hasText = chatInput.value.trim().length > 0;
      sendBtn.disabled = state.waiting || !hasText;
    }

    chatInput.addEventListener("input", () => {
      autosizeTextarea(chatInput);
      updateSendEnabled();
    });

    chatInput.addEventListener("keydown", (e) => {
      // Enter sends; Shift+Enter inserts newline. Don't send while waiting.
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) $("chat-form").requestSubmit();
      }
    });

    $("chat-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (state.waiting) return;
      const err = $("chat-error");
      err.classList.add("hidden");

      const message = chatInput.value.trim();
      if (!message) return;
      if (!state.sessionId) {
        err.textContent = "Session missing. Start a new plan.";
        err.classList.remove("hidden");
        return;
      }

      pushMessage("user", message);
      chatInput.value = "";
      autosizeTextarea(chatInput);
      state.waiting = true;
      updateSendEnabled();
      updateSavePlanButton();
      renderChat();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: state.sessionId, message }),
        });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        const data = await res.json();

        // The /chat endpoint returns a structured { plan }. Treat the plan
        // itself as the machine-readable reply and use its `notes` as the
        // visible assistant message (same pattern as build_assistant_note).
        let replyText = "";
        try {
          if (data && data.plan && Array.isArray(data.plan.meals)) {
            state.plan = data.plan;
            persistPlan(data.plan);
            markPlanDirty();
            replyText = assistantNote(data.plan, "Updated your plan.");
          } else {
            replyText = "(no plan returned — leaving the previous one in place)";
          }
        } catch {
          replyText = "(couldn't parse the new plan — keeping the previous one)";
        }

        state.waiting = false;
        pushMessage("assistant", replyText);
        renderPlan(state.plan);
        updateSavePlanButton();
      } catch (ex) {
        state.waiting = false;
        err.textContent = ex.message;
        err.classList.remove("hidden");
        renderChat();
      } finally {
        updateSendEnabled();
        updateSavePlanButton();
        chatInput.focus();
      }
    });

    $("save-plan-btn").addEventListener("click", async () => {
      if (!isLoggedIn() || !state.planDirty || state.savingPlan || state.waiting) return;
      const err = $("plan-save-error");
      err.classList.add("hidden");
      if (!state.sessionId) {
        err.textContent = "Session missing. Start a new plan.";
        err.classList.remove("hidden");
        return;
      }
      state.savingPlan = true;
      updateSavePlanButton();
      try {
        const res = await fetch("/plan/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: state.sessionId }),
        });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        markPlanClean();
      } catch (ex) {
        err.textContent = ex.message || "Could not save plan.";
        err.classList.remove("hidden");
      } finally {
        state.savingPlan = false;
        updateSavePlanButton();
      }
    });

    window.addEventListener("beforeunload", (e) => {
      if (!state.planDirty) return;
      e.preventDefault();
      e.returnValue = "";
    });

    // ---------- Header actions ----------
    $("new-plan-btn").addEventListener("click", () => {
      if (!confirmDiscardUnsaved()) return;
      if (isLoggedIn()) {
        fillProfileForm(state.profile);
        showOnboarding("plan");
        return;
      }
      // Guest: clear storage → reload → welcome → Guest again.
      clearSession();
      window.location.reload();
    });

    $("new-chat-btn").addEventListener("click", async () => {
      if (!confirmDiscardUnsaved()) return;
      try {
        await resumeConversation();
      } catch (ex) {
        $("chat-error").textContent = ex.message;
        $("chat-error").classList.remove("hidden");
      }
    });

    $("update-prefs-btn").addEventListener("click", () => {
      if (!confirmDiscardUnsaved()) return;
      fillProfileForm(state.profile);
      showOnboarding("prefs");
    });

    $("logout-btn").addEventListener("click", async () => {
      if (!confirmDiscardUnsaved()) return;
      try {
        await fetch("/logout", { method: "POST" });
      } catch {
        // Still clear local state even if the network call fails.
      }
      state.username = null;
      state.profile = null;
      clearSession();
      showWelcome();
    });

    $("guest-btn").addEventListener("click", () => {
      showOnboarding("plan");
    });

    $("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = $("login-error");
      const btn = $("login-btn");
      err.classList.add("hidden");
      btn.disabled = true;
      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: $("login-username").value.trim(),
            password: $("login-password").value,
          }),
        });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        // Cookie is set; /auth/me drives the same branches as boot.
        const meRes = await fetch("/auth/me");
        if (!meRes.ok) throw new Error((await meRes.json()).detail || meRes.statusText);
        await enterLoggedInFromAuth(await meRes.json());
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.remove("hidden");
      } finally {
        btn.disabled = false;
      }
    });

    // ---------- Boot ----------
    (async function init() {
      try {
        const meRes = await fetch("/auth/me");
        if (meRes.ok) {
          const me = await meRes.json();
          await enterLoggedInFromAuth(me);
          return;
        }
      } catch {
        // Treat network errors like logged-out.
      }

      // Guest / logged out
      if (state.sessionId) {
        // Guest reload: sessionStorage still has session_id → SPLIT
        if (state.plan) {
          state.messages = [
            {
              role: "assistant",
              text: assistantNote(state.plan, "Here's your meal plan. Ask me to adjust anything."),
            },
          ];
        }
        showSplitView();
      } else {
        showWelcome();
      }
    })();
  </script>
</body>
</html>
